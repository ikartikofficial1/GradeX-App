<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Academic Vault - GradeX</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-body: #FFF8F0; --text-main: #2c1a18;
            --light-brown: #C08552; --med-brown: #8C5A3C; --dark-brown: #4B2E2B;
            --card-bg: #ffffff; --card-shadow: rgba(140, 90, 60, 0.08);
        }

        body.dark-theme {
            --bg-body: #1c1110; --text-main: #e6dfd8;
            --card-bg: #241514; --card-shadow: rgba(0, 0, 0, 0.4);
        }

        body { background-color: var(--bg-body); color: var(--text-main); font-family: "Lexend Deca", sans-serif; min-height: 100vh; transition: 0.3s; }
        .top-navbar { padding: 20px 30px; border-bottom: 1px solid rgba(192, 133, 82, 0.15); }
        .back-btn { background: var(--card-bg); border: 1px solid rgba(192, 133, 82, 0.3); color: var(--text-main); padding: 8px 20px; border-radius: 50px; text-decoration: none; font-weight: 600; }

        .main-container { padding: 40px 20px; max-width: 800px; margin: 0 auto; }
        .vault-card { background: var(--card-bg); padding: 30px; border-radius: 24px; box-shadow: 0 10px 40px var(--card-shadow); border: 1px solid rgba(192, 133, 82, 0.15); }
        
        .input-box { background: var(--bg-body); border: 1px solid rgba(192, 133, 82, 0.3); border-radius: 12px; padding: 12px; color: var(--text-main); width: 100%; }
        .btn-save { background: var(--med-brown); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 600; }
        
        .marks-list { margin-top: 30px; }
        .subject-item { background: rgba(192, 133, 82, 0.05); padding: 15px 20px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(192, 133, 82, 0.1); }
        .btn-delete { color: #ff4d4d; cursor: pointer; font-weight: bold; border: none; background: none; }
    </style>
</head>

<body>
    <div class="top-navbar">
        <a href="tools.html" class="back-btn"><span>←</span> Back To Tools</a>
    </div>

    <div class="main-container">
        <div class="vault-card">
            <h2 class="text-center mb-4 fw-bold" style="color: var(--med-brown);">📁 My Academic Vault</h2>
            <p class="text-center opacity-75 mb-4">Apne subjects aur marks yahan hamesha ke liye save karlo.</p>

            <div class="row g-3">
                <div class="col-md-5">
                    <input type="text" id="sub-name" class="input-box" placeholder="Subject (e.g. Maths)">
                </div>
                <div class="col-md-4">
                    <input type="number" id="sub-marks" class="input-box" placeholder="Marks (e.g. 85)">
                </div>
                <div class="col-md-3">
                    <button class="btn-save w-100" onclick="addSubject()">Add Item</button>
                </div>
            </div>

            <div id="loading-text" class="text-center mt-4" style="display:none;">Cloud se sync ho raha hai... ☁️</div>

            <div class="marks-list" id="marks-display-area">
                </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAYZi5fvboG6OCr8QtD8y2S29sRPDK4cd4",
            authDomain: "my-gemini-bot-gradex.firebaseapp.com",
            databaseURL: "https://my-gemini-bot-gradex-default-rtdb.firebaseio.com/",
            projectId: "my-gemini-bot-gradex",
            storageBucket: "my-gemini-bot-gradex.firebasestorage.app",
            messagingSenderId: "979133444805",
            appId: "1:979133444805:web:e1bc587482362365e2b6ac"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const database = firebase.database();
        let currentUser = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                loadUserMarks();
            } else {
                alert("Pehle login karo bhai!");
                window.location.href = 'index.html';
            }
        });

        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');

        function addSubject() {
            const name = document.getElementById('sub-name').value.trim();
            const marks = document.getElementById('sub-marks').value.trim();

            if(!name || !marks) return alert("Dono dabba bharo!");

            const subjectId = "sub_" + Date.now();
            database.ref('userMarks/' + currentUser.uid + '/' + subjectId).set({
                name: name,
                marks: marks
            }).then(() => {
                document.getElementById('sub-name').value = "";
                document.getElementById('sub-marks').value = "";
            });
        }

        function loadUserMarks() {
            document.getElementById('loading-text').style.display = 'block';
            database.ref('userMarks/' + currentUser.uid).on('value', (snapshot) => {
                document.getElementById('loading-text').style.display = 'none';
                const data = snapshot.val();
                const displayArea = document.getElementById('marks-display-area');
                displayArea.innerHTML = "";

                if(data) {
                    Object.keys(data).forEach(id => {
                        displayArea.innerHTML += `
                            <div class="subject-item">
                                <div>
                                    <span class="fw-bold">${data[id].name}</span>: 
                                    <span style="color: var(--light-brown)">${data[id].marks}</span>
                                </div>
                                <button class="btn-delete" onclick="deleteSubject('${id}')">✕</button>
                            </div>
                        `;
                    });
                } else {
                    displayArea.innerHTML = "<p class='text-center opacity-50'>Abhi koi data nahi hai. Shuruat karo!</p>";
                }
            });
        }

        function deleteSubject(id) {
            database.ref('userMarks/' + currentUser.uid + '/' + id).remove();
        }
    </script>
</body>
</html>
