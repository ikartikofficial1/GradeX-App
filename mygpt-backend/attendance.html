<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance Manager - GradeX</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-body: #FFF8F0;
            --text-main: #2c1a18;
            --input-bg: #ffffff;
            --input-border: rgba(192, 133, 82, 0.3);
            --light-brown: #C08552;
            --med-brown: #8C5A3C;
            --dark-brown: #4B2E2B;
            --card-bg: #ffffff;
            --card-shadow: rgba(140, 90, 60, 0.08);
            --safe-green: #2ecc71;
            --danger-red: #e74c3c;
        }

        body.dark-theme {
            --bg-body: #1c1110;
            --text-main: #e6dfd8;
            --input-bg: #2c1a18;
            --input-border: rgba(192, 133, 82, 0.2);
            --card-bg: #241514;
            --card-shadow: rgba(0, 0, 0, 0.4);
        }

        body { background-color: var(--bg-body); color: var(--text-main); font-family: "Lexend Deca", sans-serif; min-height: 100vh; display: flex; flex-direction: column; transition: background-color 0.3s ease, color 0.3s ease; }
        .top-navbar { padding: 20px 30px; display: flex; align-items: center; border-bottom: 1px solid rgba(192, 133, 82, 0.15); }
        .back-btn { background: var(--card-bg); border: 1px solid var(--input-border); color: var(--text-main); padding: 8px 20px; border-radius: 50px; text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px var(--card-shadow); }

        .main-container { flex-grow: 1; display: flex; justify-content: center; padding: 20px; }
        .calculator-card { background: var(--card-bg); padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px var(--card-shadow); border: 1px solid var(--input-border); width: 100%; max-width: 650px; animation: fadeInUp 0.5s ease; }

        .input-group-custom { margin-bottom: 18px; }
        .input-group-custom label { font-weight: 500; margin-bottom: 8px; display: block; opacity: 0.9; }
        .custom-input { background-color: var(--input-bg); border: 2px solid var(--input-border); color: var(--text-main); border-radius: 12px; padding: 14px 20px; width: 100%; }

        .calc-btn { background-color: var(--med-brown); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: 600; margin-top: 10px; }
        .explain-btn { background-color: transparent; border: 2px solid var(--light-brown); color: var(--light-brown); width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; margin-top: 15px; display: none; }
        .continue-btn { background-color: var(--dark-brown); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; margin-top: 15px; display: none; }

        .result-box { margin-top: 25px; background: rgba(192, 133, 82, 0.08); border-radius: 16px; padding: 25px; display: none; animation: fadeInUp 0.4s ease; text-align: center; }
        .percent-circle { width: 100px; height: 100px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 15px auto; font-size: 24px; font-weight: 700; border: 6px solid var(--med-brown); }

        .ai-analysis-area { margin-top: 20px; text-align: left; padding: 15px; border-radius: 12px; background: rgba(255, 255, 255, 0.3); border-left: 4px solid var(--light-brown); display: none; line-height: 1.6; }

        .loader-container { display: flex; justify-content: center; align-items: center; height: 40px; }
        .spinner-ring { width: 30px; height: 30px; border: 3px solid rgba(192, 133, 82, 0.2); border-top-color: var(--light-brown); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body>

    <div class="top-navbar">
        <a href="tools.html" class="back-btn"><span>←</span> Back to Tools</a>
    </div>

    <div class="main-container">
        <div class="calculator-card">
            <h2 class="text-center mb-4 fw-bold" style="color: var(--med-brown);">Attendance Manager</h2>

            <div class="input-group-custom">
                <label>Total Classes Held (Till Today)</label>
                <input type="number" id="total-classes" class="custom-input" placeholder="e.g., 500">
            </div>

            <div class="input-group-custom">
                <label>Classes You Attended</label>
                <input type="number" id="attended-classes" class="custom-input" placeholder="e.g., 180">
            </div>

            <div class="input-group-custom">
                <label>Target Percentage (%)</label>
                <input type="number" id="target-percent" class="custom-input" value="75">
            </div>

            <button class="calc-btn" onclick="calculateAttendance()">Check My Status</button>

            <div id="result-area" class="result-box">
                <div id="success-data">
                    <div class="percent-circle" id="res-circle"><span id="res-percent">0%</span></div>
                    <div id="res-action" class="fw-bold mb-3"></div>
                    
                    <button id="explain-btn" class="explain-btn" onclick="explainWithAI()">🤔 Explain me how? Kya karu?</button>
                    
                    <div id="ai-analysis" class="ai-analysis-area">
                        <div id="ai-loading" class="loader-container" style="display: none;"><div class="spinner-ring"></div></div>
                        <div id="ai-text"></div>
                    </div>

                    <button id="continue-btn" class="continue-btn" onclick="continueToMainChat()">💬 Continue Chat with AI</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyAYZi5fvboG6OCr8QtD8y2S29sRPDK4cd4",
            authDomain: "my-gemini-bot-gradex.firebaseapp.com",
            databaseURL: "https://my-gemini-bot-gradex-default-rtdb.firebaseio.com/",
            projectId: "my-gemini-bot-gradex",
            storageBucket: "my-gemini-bot-gradex.firebasestorage.app",
            messagingSenderId: "979133444805",
            appId: "1:979133444805:web:e1bc587482362365e2b6ac"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const database = firebase.database();
        let currentUser = null;
        auth.onAuthStateChanged(user => { currentUser = user; });

        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');

        let mathAnalysis = ""; // AI text store karne ke liye

        function calculateAttendance() {
            const total = parseInt(document.getElementById('total-classes').value);
            const attended = parseInt(document.getElementById('attended-classes').value);
            const target = parseInt(document.getElementById('target-percent').value);
            
            if (isNaN(total) || isNaN(attended) || attended > total) { alert("Sahi values daalo bhai!"); return; }

            let currentPercent = (attended / total) * 100;
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('res-percent').innerText = currentPercent.toFixed(1) + "%";
            document.getElementById('explain-btn').style.display = 'block';
            document.getElementById('ai-analysis').style.display = 'none';
            document.getElementById('continue-btn').style.display = 'none';

            let actionText = "";
            if (currentPercent >= target) {
                let bunk = Math.floor((100 * attended - target * total) / target);
                actionText = bunk > 0 ? `Safe Zone! Tu ${bunk} classes bunk kar sakta hai.` : `Edge pe hai bhai, bunk mat marna!`;
                document.getElementById('res-circle').style.borderColor = "var(--safe-green)";
            } else {
                let req = Math.ceil((target * total - 100 * attended) / (100 - target));
                actionText = `Danger! Tujhe lagatar ${req} classes leni padengi.`;
                document.getElementById('res-circle').style.borderColor = "var(--danger-red)";
            }
            document.getElementById('res-action').innerText = actionText;
            
            // MATH EXPLANATION FOR AI
            mathAnalysis = `Data: Total classes held so far = ${total}, Attended = ${attended}, Target = ${target}%. Current percentage is ${currentPercent.toFixed(1)}%.`;
        }

        async function explainWithAI() {
            const aiArea = document.getElementById('ai-analysis');
            const aiText = document.getElementById('ai-text');
            const aiLoading = document.getElementById('ai-loading');
            const continueBtn = document.getElementById('continue-btn');
            const explainBtn = document.getElementById('explain-btn');

            aiArea.style.display = 'block';
            aiLoading.style.display = 'flex';
            aiText.innerText = "";
            explainBtn.disabled = true;

            const prompt = `${mathAnalysis}. Mera ek best friend bankar mujhe deep aur friendly detail me samjhao ki ye calculation kaise hui? Mujhe dilaasa do aur ek solid plan batao ki main apni attendance kaise improve karu bina stress liye. Jawab ekdum human touch me dena.`;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: prompt, userName: currentUser ? currentUser.displayName.split(" ")[0] : "Dost" })
                });
                const data = await response.json();
                aiLoading.style.display = 'none';

                if (data && data.candidates) {
                    let reply = data.candidates[0].content.parts[0].text;
                    let index = 0;
                    // 🔥 TYPEWRITER EFFECT 🔥
                    let interval = setInterval(() => {
                        if (index <= reply.length) {
                            aiText.innerHTML = marked.parse(reply.substring(0, index));
                            index += 3;
                        } else {
                            clearInterval(interval);
                            continueBtn.style.display = 'block';
                        }
                    }, 15);
                }
            } catch (err) {
                aiLoading.style.display = 'none';
                aiText.innerText = "Backend band hai shayad!";
            }
        }

        function continueToMainChat() {
            if (!currentUser) { alert("Pehle login karlo main page par!"); return; }
            const newChatId = "attendance_" + Date.now();
            const msgs = [
                { role: 'user', text: "Bhai meri attendance analyze karo." },
                { role: 'bot', text: document.getElementById('ai-text').innerText },
                { role: 'bot', text: "Haa bhai, ab btao?? Aage kya janna hai attendance ke baare mein ya kuch aur? 😊" }
            ];

            database.ref('userChats/' + currentUser.uid + '/' + newChatId).set({
                title: "📅 Attendance Talk",
                messages: msgs
            }).then(() => {
                localStorage.setItem('activeChatId', newChatId);
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
