<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shared Chat - MyGPT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-body: #FFF8F0; --text-main: #2c1a18;
            --user-bubble-bg: #C08552; --user-bubble-text: #ffffff; 
            --bot-bubble-bg: #ffffff; --bot-bubble-text: #2c1a18; 
            --bot-bubble-border: rgba(192, 133, 82, 0.15);
            --light-brown: #C08552; --med-brown: #8C5A3C; --dark-brown: #4B2E2B;
        }

        body.dark-theme {
            --bg-body: #1c1110; --text-main: #e6dfd8;
            --user-bubble-bg: #8C5A3C; --user-bubble-text: #e6dfd8; 
            --bot-bubble-bg: #1c1110; --bot-bubble-text: #e6dfd8; 
            --bot-bubble-border: rgba(192, 133, 82, 0.1);
        }

        body { background-color: var(--bg-body); color: var(--text-main); font-family: "Lexend Deca", sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column;}

        .top-banner { background: var(--bg-body); padding: 15px 20px; border-bottom: 1px solid rgba(192, 133, 82, 0.15); text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.02);}
        .banner-title { font-weight: 700; color: var(--med-brown); margin: 0; font-size: 18px;}
        .banner-subtitle { font-size: 12px; opacity: 0.7; margin: 0; }
        .create-own-btn { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); background: var(--med-brown); color: white; border: none; padding: 6px 15px; border-radius: 50px; font-size: 13px; font-weight: bold; text-decoration: none; transition: 0.3s;}
        .create-own-btn:hover { background: var(--dark-brown); color: white;}

        .chat-history { flex-grow: 1; padding: 30px 20px; max-width: 850px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 15px; }

        .message-bubble { padding: 16px 22px; border-radius: 24px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04); max-width: 85%; font-size: 15.5px; line-height: 1.6; overflow-wrap: break-word; }
        .user-msg { background-color: var(--user-bubble-bg); color: var(--user-bubble-text); border-bottom-right-radius: 6px; border-top-right-radius: 24px; }
        .bot-msg { background-color: var(--bot-bubble-bg); color: var(--bot-bubble-text); border: 1px solid var(--bot-bubble-border); border-bottom-left-radius: 6px; border-top-left-radius: 24px; }
        
        .bot-msg p { margin-bottom: 12px; }
        .bot-msg p:last-child { margin-bottom: 0; }
        .bot-msg strong { color: var(--light-brown); }
        .bot-msg code { background-color: var(--bg-body); padding: 2px 6px; border-radius: 6px; color: var(--light-brown); font-family: monospace; }
        body.dark-theme .bot-msg code { background-color: #2c1a18; color: #FFF8F0; }

        .loader-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; opacity: 0.6; }
        .loader-spinner { width: 40px; height: 40px; border: 4px solid rgba(192, 133, 82, 0.2); border-top: 4px solid var(--med-brown); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;}
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            .create-own-btn { display: none; } /* Hide on small mobile to save space */
            .message-bubble { max-width: 95%; font-size: 14.5px; padding: 14px 18px; }
        }
    </style>
</head>

<body>

    <div class="top-banner">
        <h1 class="banner-title" id="chat-title">Loading Shared Chat...</h1>
        <p class="banner-subtitle" id="chat-meta">Please wait</p>
        <a href="index.html" class="create-own-btn">Try MyGPT</a>
    </div>

    <div class="chat-history" id="chat-display">
        <div class="loader-box">
            <div class="loader-spinner"></div>
            <div>Fetching conversation...</div>
        </div>
    </div>

    <script>
        // 🛑 TUMHARI FIREBASE CONFIG 🛑
        const firebaseConfig = {
            apiKey: "AIzaSyAYZi5fvboG6OCr8QtD8y2S29sRPDK4cd4",
            authDomain: "my-gemini-bot-gradex.firebaseapp.com",
            databaseURL: "https://my-gemini-bot-gradex-default-rtdb.firebaseio.com/",
            projectId: "my-gemini-bot-gradex",
            storageBucket: "my-gemini-bot-gradex.firebasestorage.app",
            messagingSenderId: "979133444805",
            appId: "1:979133444805:web:e1bc587482362365e2b6ac"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        // Theme check
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
        }

        // Get ID from URL (e.g., share.html?id=share_12345)
        const urlParams = new URLSearchParams(window.location.search);
        const shareId = urlParams.get('id');

        const chatDisplay = document.getElementById('chat-display');
        const titleEl = document.getElementById('chat-title');
        const metaEl = document.getElementById('chat-meta');

        if (!shareId) {
            chatDisplay.innerHTML = `<div class="text-center mt-5 text-danger fw-bold">Invalid Share Link! No ID found. 🛑</div>`;
            titleEl.innerText = "Error";
            metaEl.innerText = "";
        } else {
            database.ref('sharedChats/' + shareId).once('value').then((snapshot) => {
                const data = snapshot.val();
                
                if (data) {
                    titleEl.innerText = data.title.replace(/&quot;/g, '"') || "Shared Conversation";
                    
                    const dateStr = new Date(data.sharedAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
                    metaEl.innerText = `Shared by ${data.sharedBy} • ${dateStr}`;

                    chatDisplay.innerHTML = ""; // Clear loader

                    if (data.messages && data.messages.length > 0) {
                        data.messages.forEach(msg => {
                            if (msg.role === 'user') {
                                chatDisplay.innerHTML += `
                                <div class="d-flex justify-content-end w-100 mb-2">
                                    <div class="message-bubble user-msg">
                                        <strong>${data.sharedBy}:</strong> <br>${msg.text}
                                    </div>
                                </div>`;
                            } else {
                                chatDisplay.innerHTML += `
                                <div class="d-flex justify-content-start w-100 mb-2">
                                    <div class="message-bubble bot-msg">
                                        <strong>MyGPT:</strong> <br>${marked.parse(msg.text)}
                                    </div>
                                </div>`;
                            }
                        });
                    } else {
                        chatDisplay.innerHTML = `<div class="text-center opacity-50 mt-5">This chat is empty. 👻</div>`;
                    }
                } else {
                    chatDisplay.innerHTML = `<div class="text-center mt-5 text-danger fw-bold">Chat not found or has been deleted! 🛑</div>`;
                    titleEl.innerText = "Chat Not Found";
                    metaEl.innerText = "";
                }
            }).catch(err => {
                chatDisplay.innerHTML = `<div class="text-center mt-5 text-danger">Database error occurred while fetching.</div>`;
            });
        }
    </script>
</body>
</html>
