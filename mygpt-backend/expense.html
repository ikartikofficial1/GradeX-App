<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kharcha Manager - GradeX</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-body: #FFF8F0; --text-main: #2c1a18;
            --light-brown: #C08552; --med-brown: #8C5A3C; --dark-brown: #4B2E2B;
            --card-bg: #ffffff; --card-shadow: rgba(140, 90, 60, 0.08);
            --safe-green: #27ae60; --danger-red: #e74c3c;
            --green-bg: rgba(39, 174, 96, 0.1); --red-bg: rgba(231, 76, 60, 0.1);
        }

        body.dark-theme {
            --bg-body: #1c1110; --text-main: #e6dfd8;
            --card-bg: #241514; --card-shadow: rgba(0, 0, 0, 0.4);
        }

        body { background-color: var(--bg-body); color: var(--text-main); font-family: "Lexend Deca", sans-serif; min-height: 100vh; display: flex; flex-direction: column; transition: 0.3s; }
        .top-navbar { padding: 20px 30px; border-bottom: 1px solid rgba(192, 133, 82, 0.15); }
        .back-btn { background: var(--card-bg); border: 1px solid rgba(192, 133, 82, 0.3); color: var(--text-main); padding: 8px 20px; border-radius: 50px; text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px var(--card-shadow); }
        .back-btn:hover { background: var(--light-brown); color: white; transform: translateX(-3px); }

        .main-container { flex-grow: 1; display: flex; justify-content: center; padding: 30px 20px; }
        .expense-card { background: var(--card-bg); padding: 30px; border-radius: 24px; box-shadow: 0 10px 40px var(--card-shadow); border: 1px solid rgba(192, 133, 82, 0.15); width: 100%; max-width: 500px; animation: fadeInUp 0.5s ease; }

        /* Balance Display Area */
        .balance-area { text-align: center; margin-bottom: 30px; padding: 20px; background: rgba(192, 133, 82, 0.05); border-radius: 20px; border: 1px dashed rgba(192, 133, 82, 0.3); }
        .balance-title { font-size: 16px; font-weight: 600; opacity: 0.8; margin-bottom: 5px; }
        .balance-amount { font-size: 45px; font-weight: 700; color: var(--med-brown); margin: 0; }

        /* Input Form */
        .input-group-custom { margin-bottom: 15px; }
        .custom-input { background-color: var(--bg-body); border: 2px solid rgba(192, 133, 82, 0.3); color: var(--text-main); border-radius: 12px; padding: 14px 20px; font-size: 16px; width: 100%; transition: 0.3s; }
        .custom-input:focus { border-color: var(--light-brown); outline: none; box-shadow: 0 0 0 4px rgba(192, 133, 82, 0.1); }

        .btn-row { display: flex; gap: 15px; margin-top: 20px; }
        .btn-credit { background-color: var(--safe-green); color: white; border: none; flex: 1; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 15px; transition: 0.3s; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.2); }
        .btn-credit:hover { background-color: #219653; transform: translateY(-2px); }
        
        .btn-debit { background-color: var(--danger-red); color: white; border: none; flex: 1; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 15px; transition: 0.3s; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.2); }
        .btn-debit:hover { background-color: #c0392b; transform: translateY(-2px); }

        /* Transaction List */
        .transaction-title { font-weight: 700; color: var(--med-brown); margin: 30px 0 15px 0; font-size: 18px; border-bottom: 1px solid rgba(192, 133, 82, 0.15); padding-bottom: 10px; }
        .transaction-list { max-height: 300px; overflow-y: auto; padding-right: 5px; }
        
        /* Custom Scrollbar for list */
        .transaction-list::-webkit-scrollbar { width: 5px; }
        .transaction-list::-webkit-scrollbar-thumb { background: rgba(192, 133, 82, 0.3); border-radius: 10px; }

        .txn-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid transparent; }
        .txn-credit { background-color: var(--green-bg); border-color: rgba(39, 174, 96, 0.2); }
        .txn-debit { background-color: var(--red-bg); border-color: rgba(231, 76, 60, 0.2); }
        
        .txn-reason { font-weight: 600; font-size: 15px; }
        .txn-date { font-size: 12px; opacity: 0.7; margin-top: 3px; }
        .txn-amt { font-weight: 700; font-size: 16px; }
        .text-credit { color: var(--safe-green); }
        .text-debit { color: var(--danger-red); }

        /* 🔥 DEEP TRACKER BUTTON CSS 🔥 */
        .deep-tracker-btn {
            display: block;
            text-align: center;
            background-color: transparent;
            color: var(--med-brown);
            border: 2px dashed var(--med-brown);
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            text-decoration: none;
            transition: 0.3s;
            margin-top: 25px;
        }

        .deep-tracker-btn:hover {
            background-color: rgba(192, 133, 82, 0.1);
            color: var(--dark-brown);
            transform: translateY(-2px);
        }
        
        body.dark-theme .deep-tracker-btn:hover {
            color: var(--light-brown);
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body>
    <div class="top-navbar">
        <a href="tools.html" class="back-btn"><span>←</span> Back to Tools</a>
    </div>

    <div class="main-container">
        <div class="expense-card">
            <h2 class="text-center fw-bold mb-4" style="color: var(--med-brown);">💸 Pocket Money Manager</h2>
            <div class="balance-area">
                <div class="balance-title">Available Balance</div>
                <h1 class="balance-amount" id="total-balance">₹0</h1>
            </div>

            <div class="input-group-custom">
                <input type="number" id="txn-amount" class="custom-input" placeholder="Amount (e.g. 500)">
            </div>
            <div class="input-group-custom">
                <input type="text" id="txn-reason" class="custom-input" placeholder="Reason (e.g. Pocket Money, Canteen, Recharge)">
            </div>

            <div class="btn-row">
                <button class="btn-credit" onclick="addTransaction('credit')">🟢 Add Money (+)</button>
                <button class="btn-debit" onclick="addTransaction('debit')">🔴 Spend Money (-)</button>
            </div>

            <div class="transaction-title">Recent Transactions</div>
            <div class="transaction-list" id="transaction-list">
                <div class="text-center opacity-50 mt-3" id="loading-txt">Loading data... ☁️</div>
            </div>

            <a href="Deep-expense-tracker.html" class="deep-tracker-btn">Deep Expense Tracker 📊</a>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyAYZi5fvboG6OCr8QtD8y2S29sRPDK4cd4",
            authDomain: "my-gemini-bot-gradex.firebaseapp.com",
            databaseURL: "https://my-gemini-bot-gradex-default-rtdb.firebaseio.com/",
            projectId: "my-gemini-bot-gradex",
            storageBucket: "my-gemini-bot-gradex.firebasestorage.app",
            messagingSenderId: "979133444805",
            appId: "1:979133444805:web:e1bc587482362365e2b6ac"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const database = firebase.database();
        let currentUser = null;

        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                loadTransactionsRealtime(); // User aate hi data load karna shuru
            } else {
                alert("Pehle login karlo bhai!");
                window.location.href = 'index.html';
            }
        });

        // 🔥 LOGIC 1: ADD TRANSACTION KAISE HOGA 🔥
        function addTransaction(type) {
            const amountInput = document.getElementById('txn-amount');
            const reasonInput = document.getElementById('txn-reason');
            
            const amount = parseFloat(amountInput.value);
            const reason = reasonInput.value.trim();

            if (!amount || amount <= 0) return alert("Bhai koi theek sa amount daal!");
            if (!reason) return alert("Paisa kahan gaya/kahan se aaya, wo reason toh likh de!");

            const txnId = "txn_" + Date.now();
            
            // Firebase me entry save karna
            database.ref('userFinance/' + currentUser.uid + '/transactions/' + txnId).set({
                type: type, // 'credit' ya 'debit'
                amount: amount,
                reason: reason,
                timestamp: Date.now()
            }).then(() => {
                // Save hone ke baad dabbe khali kar do
                amountInput.value = "";
                reasonInput.value = "";
                amountInput.focus();
            });
        }

        // 🔥 LOGIC 2: REAL-TIME DATA LOAD & BALANCE CALCULATION 🔥
        function loadTransactionsRealtime() {
            database.ref('userFinance/' + currentUser.uid + '/transactions').on('value', (snapshot) => {
                const data = snapshot.val();
                const listArea = document.getElementById('transaction-list');
                const balanceDisplay = document.getElementById('total-balance');
                
                listArea.innerHTML = "";
                let totalBalance = 0;

                if (data) {
                    // Firebase ke random keys ko Array me convert karke Time ke hisaab se Sort kar rahe hain
                    // Taki sabse nayi entry sabse upar dikhe
                    const transactionsArray = Object.keys(data).map(key => data[key]).sort((a, b) => b.timestamp - a.timestamp);

                    transactionsArray.forEach(txn => {
                        // 1. Balance Calculation
                        if (txn.type === 'credit') {
                            totalBalance += txn.amount;
                        } else {
                            totalBalance -= txn.amount;
                        }

                        // 2. UI Formatting (Green for Credit, Red for Debit)
                        const isCredit = txn.type === 'credit';
                        const sign = isCredit ? '+' : '-';
                        const colorClass = isCredit ? 'text-credit' : 'text-debit';
                        const bgClass = isCredit ? 'txn-credit' : 'txn-debit';
                        
                        // Date formatting
                        const dateObj = new Date(txn.timestamp);
                        const dateStr = dateObj.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });

                        // 3. List me add karna
                        listArea.innerHTML += `
                            <div class="txn-item ${bgClass}">
                                <div>
                                    <div class="txn-reason">${txn.reason}</div>
                                    <div class="txn-date">${dateStr}</div>
                                </div>
                                <div class="txn-amt ${colorClass}">${sign}₹${txn.amount}</div>
                            </div>
                        `;
                    });
                } else {
                    listArea.innerHTML = `<div class="text-center opacity-50 mt-3">Koi kharcha nahi! Paise bacha raha hai bhai! 💰</div>`;
                }

                // Final Balance ko UI par update karna
                balanceDisplay.innerText = "₹" + totalBalance.toLocaleString('en-IN');
            });
        }
    </script>
</body>
</html>
