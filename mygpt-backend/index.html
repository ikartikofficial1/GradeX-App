<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyGPT - Personal Companion</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* 🔥 COLOR PALETTE & THEME VARIABLES 🔥 */
        :root {
            --bg-body: #FFF8F0;
            --text-main: #2c1a18;
            --sidebar-bg: #4B2E2B;
            --sidebar-text: #FFF8F0;
            --input-bg: #ffffff;
            --input-border: rgba(192, 133, 82, 0.3);
            --profile-bg: #ffffff;
            --dropdown-bg: #ffffff;
            --dropdown-text: #2c1a18;
            --dropdown-shadow: rgba(75, 46, 43, 0.1);
            --user-bubble-bg: #C08552;
            --user-bubble-text: #ffffff;
            --bot-bubble-bg: #ffffff;
            --bot-bubble-text: #2c1a18;
            --bot-bubble-border: rgba(192, 133, 82, 0.15);
            --light-brown: #C08552;
            --med-brown: #8C5A3C;
            --dark-brown: #4B2E2B;
            --white: #ffffff;
            --red-logout: #ff4d4d;
        }

        /* 🌑 DARK THEME DEFINITION 🌑 */
        body.dark-theme {
            --bg-body: #1c1110;
            --text-main: #e6dfd8;
            --sidebar-bg: #0f0908;
            --sidebar-text: #e6dfd8;
            --input-bg: #2c1a18;
            --input-border: rgba(192, 133, 82, 0.2);
            --profile-bg: #2c1a18;
            --dropdown-bg: #2c1a18;
            --dropdown-text: #e6dfd8;
            --dropdown-shadow: rgba(0, 0, 0, 0.4);
            --user-bubble-bg: #8C5A3C;
            --user-bubble-text: #e6dfd8;
            --bot-bubble-bg: #1c1110;
            --bot-bubble-text: #e6dfd8;
            --bot-bubble-border: rgba(192, 133, 82, 0.1);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: "Lexend Deca", sans-serif;
            position: relative;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* 🔥 AI THINKING SPINNER & ANIMATIONS 🔥 */
        .thinking-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(192, 133, 82, 0.2);
            border-top-color: var(--light-brown);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .thinking-text-phrase {
            transition: opacity 0.3s ease;
            font-size: 14px;
        }

        .auth-container {
            position: fixed;
            /* 🔥 FIX: Absolute se Fixed kiya */
            top: 15px;
            right: 20px;
            z-index: 1000;
        }

        .btn-custom-outline {
            border: 2px solid var(--dark-brown);
            color: var(--dark-brown);
            border-radius: 50px;
            font-weight: 600;
            padding: 8px 20px;
            transition: 0.3s;
            background: var(--profile-bg);
        }

        .btn-custom-outline:hover {
            background-color: var(--dark-brown);
            color: var(--white);
        }

        .profile-area {
            position: relative;
        }

        .profile-trigger {
            display: none;
            align-items: center;
            gap: 12px;
            background: var(--profile-bg);
            padding: 8px 18px;
            border-radius: 50px;
            box-shadow: 0 4px 15px var(--dropdown-shadow);
            border: 1px solid rgba(192, 133, 82, 0.2);
            cursor: pointer;
            transition: 0.3s ease;
        }

        .profile-trigger:hover {
            box-shadow: 0 6px 20px var(--dropdown-shadow);
            border-color: var(--light-brown);
        }

        .profile-pic {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid var(--light-brown);
            object-fit: cover;
        }

        #user-name {
            color: var(--text-main);
            font-weight: 600;
            font-size: 15px;
        }

        .dropdown-arrow {
            font-size: 10px;
            color: var(--text-main);
            opacity: 0.6;
            transition: 0.3s;
        }

        .profile-trigger.active .dropdown-arrow {
            transform: rotate(180deg);
        }

        .profile-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            background: var(--dropdown-bg);
            color: var(--dropdown-text);
            border-radius: 12px;
            min-width: 220px;
            box-shadow: 0 8px 30px var(--dropdown-shadow);
            border: 1px solid rgba(192, 133, 82, 0.15);
            z-index: 1060;
            padding: 10px 0;
            animation: dropdownFadeIn 0.3s ease;
            opacity: 0;
        }

        .profile-dropdown.active {
            display: block;
            opacity: 1;
        }

        .dropdown-item {
            padding: 10px 20px;
            font-weight: 500;
            font-size: 14.5px;
            transition: 0.2s;
            border: none;
            background: transparent;
            color: var(--dropdown-text);
            width: 100%;
            text-align: start;
            display: flex;
            align-items: center;
        }

        .dropdown-item:hover {
            background-color: rgba(192, 133, 82, 0.06);
            color: var(--light-brown);
        }

        .dropdown-divider {
            height: 1px;
            background-color: rgba(192, 133, 82, 0.1);
            margin: 8px 0;
        }

        .btn-logout-item {
            color: var(--red-logout) !important;
            font-weight: 600;
        }

        .form-switch .form-check-input {
            width: 2.2em;
            height: 1.2em;
            cursor: pointer;
            background-color: #d4c5ba;
            border-color: rgba(192, 133, 82, 0.3);
        }

        .form-switch .form-check-input:checked {
            background-color: var(--light-brown);
            border-color: var(--light-brown);
        }

        .hamburger-btn {
            display: none;
            position: fixed;
            /* 🔥 FIX: Absolute se Fixed kiya */
            top: 15px;
            left: 15px;
            z-index: 990;
            /* ... baaki style wahi rahega ... */
            background: var(--white);
            border: 1px solid rgba(192, 133, 82, 0.3);
            color: var(--dark-brown);
            font-size: 22px;
            padding: 4px 12px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .mobile-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1040;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sidebar {
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            width: 280px;
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
            border-top-right-radius: 24px;
            border-bottom-right-radius: 24px;
            box-shadow: 5px 0 25px rgba(0, 0, 0, 0.1);
            z-index: 1050;
            transition: transform 0.3s ease;
        }

        .new-chat-btn {
            border: 1px solid rgba(255, 248, 240, 0.3);
            color: var(--sidebar-text);
            text-align: left;
            padding: 12px 20px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
        }

        .new-chat-btn:hover {
            background-color: var(--light-brown);
            border-color: var(--light-brown);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(192, 133, 82, 0.3);
        }

        .close-sidebar-btn {
            display: none;
            background: transparent;
            border: none;
            color: var(--sidebar-text);
            font-size: 30px;
            line-height: 1;
            margin-left: 10px;
        }

        .chat-list {
            margin-top: 25px;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
        }

        .chat-list::-webkit-scrollbar {
            width: 5px;
        }

        .chat-list::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .chat-item {
            position: relative;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 15px;
            cursor: pointer;
            color: #e6dfd8;
            font-size: 14.5px;
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
            color: var(--white);
        }

        /* 🔥 ACTIVE CHAT HIGHLIGHT 🔥 */
        .chat-item.active-chat {
            background-color: var(--light-brown);
            border-color: var(--med-brown);
            color: var(--white);
            box-shadow: 0 4px 10px rgba(192, 133, 82, 0.2);
        }

        body.dark-theme .chat-item.active-chat {
            background-color: var(--med-brown);
            border-color: var(--light-brown);
        }

        .chat-item.active-chat:hover {
            color: var(--white);
        }

        .chat-title-text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
            padding-right: 30px;
        }

        .chat-icon {
            margin-right: 12px;
            opacity: 0.8;
            font-size: 16px;
        }

        .chat-wrapper {
            position: relative;
        }

        .chat-options-btn {
            display: none;
            position: absolute;
            right: 10px;
            background: transparent;
            border: none;
            color: var(--sidebar-text);
            font-size: 20px;
            line-height: 1;
            padding: 0 8px;
            z-index: 10;
            border-radius: 5px;
            font-weight: bold;
        }

        .chat-options-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .chat-item:hover .chat-options-btn {
            display: block;
        }

        .chat-options-menu {
            display: none;
            position: absolute;
            right: 10px;
            top: 40px;
            background: var(--dropdown-bg);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            flex-direction: column;
            z-index: 20;
            overflow: hidden;
            min-width: 120px;
            border: 1px solid rgba(192, 133, 82, 0.2);
        }

        .chat-options-menu.active {
            display: flex;
            animation: dropdownFadeIn 0.2s ease;
        }

        .chat-option-item {
            padding: 10px 15px;
            font-size: 13.5px;
            color: var(--dropdown-text);
            border: none;
            background: transparent;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-option-item:hover {
            background-color: rgba(192, 133, 82, 0.1);
            color: var(--light-brown);
        }

        .chat-option-delete {
            color: var(--red-logout);
        }

        .chat-option-delete:hover {
            background-color: rgba(255, 77, 77, 0.1);
            color: var(--red-logout);
        }

        .inline-action-box {
            display: none;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            padding: 10px;
            margin: 0 10px 10px 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .inline-action-box.active {
            display: block;
            animation: dropdownFadeIn 0.2s ease;
        }

        .rename-input-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--white);
            border-radius: 5px;
            padding: 6px 10px;
            font-size: 13px;
            width: 100%;
            outline: none;
            margin-bottom: 8px;
        }

        .rename-input-box:focus {
            border-color: var(--light-brown);
            background: rgba(255, 255, 255, 0.15);
        }

        .action-btn {
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
        }

        .btn-confirm-del {
            background: var(--red-logout);
            color: white;
        }

        .btn-confirm-del:hover {
            background: #e60000;
        }

        .btn-confirm-save {
            background: var(--light-brown);
            color: white;
        }

        .btn-confirm-save:hover {
            background: var(--med-brown);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: var(--sidebar-text);
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            width: 100%;
            height: 100%;
            /* 🔥 FIX: Main content ko poori height do */
        }

        .input-container {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            padding: 15px 20px;
            /* Thoda padding kam kiya */
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            /* 🔥 FIX: Input ko hamesha neeche fixed rakho */
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(to top, var(--bg-body) 80%, transparent);
            /* Piche se transparent fade effect */
            z-index: 100;
        }

        .centered-state {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bottom-state {
            margin-top: auto;
        }

        .chat-history {
            display: none;
            flex-grow: 1;
            overflow-y: auto;
            overflow-x: hidden;
            /* 🔥 FIX: Padding update karo taaki input ke peeche text na chhupe */
            padding: 80px 20px 100px 20px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-history::-webkit-scrollbar {
            width: 6px;
        }

        .chat-history::-webkit-scrollbar-thumb {
            background-color: var(--light-brown);
            border-radius: 10px;
        }

        .input-history-line {
            position: absolute;
            bottom: 100%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(192, 133, 82, 0.1);
            display: none;
        }

        .bottom-state .input-history-line {
            display: block;
        }

        .custom-input {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            border-radius: 50px !important;
            box-shadow: 0 5px 20px rgba(140, 90, 60, 0.08);
            padding: 16px 25px;
            font-size: 16px !important;
            transition: all 0.3s;
        }

        .custom-input:focus {
            background-color: var(--input-bg);
            color: var(--text-main);
            box-shadow: 0 8px 25px rgba(140, 90, 60, 0.15);
            border-color: var(--light-brown);
            outline: none;
        }

        .custom-input::placeholder {
            color: #a3958d;
        }

        .send-btn {
            background-color: var(--med-brown);
            border-radius: 50px !important;
            color: white;
            border: none;
            padding: 0 25px;
            margin-left: 10px;
            font-size: 18px !important;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(140, 90, 60, 0.2);
        }

        .send-btn:hover:not(:disabled) {
            background-color: var(--dark-brown);
            transform: scale(1.05);
            color: white;
        }

        .send-btn:disabled {
            background-color: #d4c5ba;
            cursor: not-allowed;
            box-shadow: none;
        }

        .message-bubble {
            padding: 16px 22px;
            border-radius: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            max-width: 80%;
            font-size: 15.5px;
            line-height: 1.6;
            animation: fadeInUp 0.3s ease-out;
            overflow-wrap: break-word;
            word-wrap: break-word;
            word-break: break-word;
        }

        .user-msg {
            background-color: var(--user-bubble-bg);
            color: var(--user-bubble-text);
            border-bottom-right-radius: 6px;
            border-top-right-radius: 24px;
        }

        .bot-msg {
            background-color: var(--bot-bubble-bg);
            color: var(--bot-bubble-text);
            border: 1px solid var(--bot-bubble-border);
            border-bottom-left-radius: 6px;
            border-top-left-radius: 24px;
        }

        .bot-msg p {
            margin-bottom: 12px;
        }

        .bot-msg p:last-child {
            margin-bottom: 0;
        }

        .bot-msg ul,
        .bot-msg ol {
            margin-bottom: 12px;
            padding-left: 22px;
        }

        .bot-msg strong {
            color: var(--light-brown);
        }

        .bot-msg code {
            background-color: var(--bg-body);
            padding: 2px 6px;
            border-radius: 6px;
            color: var(--light-brown);
            font-family: monospace;
        }

        body.dark-theme .bot-msg code {
            background-color: #2c1a18;
            color: #FFF8F0;
        }

        .typing-cursor::after {
            content: '▋';
            display: inline-block;
            vertical-align: text-bottom;
            animation: blink 1s step-start infinite;
            color: var(--light-brown);
            margin-left: 4px;
            font-size: 14px;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes dropdownFadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1#welcome-text {
            color: var(--med-brown);
            letter-spacing: -0.5px;
            transition: color 0.3s ease;
        }

        body.dark-theme h1#welcome-text {
            color: var(--light-brown);
        }

        /* 🔥 SHARE MODAL CSS 🔥 */
        .share-modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .share-modal-backdrop.active {
            display: flex;
            animation: dropdownFadeIn 0.2s ease;
        }

        .share-modal {
            background: var(--bg-body);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(192, 133, 82, 0.3);
        }

        .share-link-box {
            background: rgba(192, 133, 82, 0.1);
            border: 1px dashed var(--med-brown);
            padding: 10px;
            border-radius: 10px;
            word-break: break-all;
            font-size: 13px;
            margin: 15px 0;
            color: var(--text-main);
        }

        .copy-btn {
            background: var(--med-brown);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }

        .copy-btn:hover {
            background: var(--dark-brown);
            transform: scale(1.05);
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }

        @media (max-width: 768px) {
            .input-container {
                padding: 10px 15px 15px 15px;
                /* Mobile par padding set */
                position: fixed;
                /* 🔥 FIX: Mobile pe input hamesha fixed bottom me */
                bottom: 0;
                left: 0;
                transform: none;
                /* TranslateX hatau, width 100% hai */
                width: 100%;
                background: var(--bg-body);
                /* Solid background taaki chat text na dikhe peeche se */
                z-index: 100;
            }

            .chat-history {
                padding-top: 70px;
                /* Header ke liye jagah */
                padding-bottom: 90px;
                /* Input box ke liye jagah */
            }

            .centered-state {
                /* Centered state me input ko middle me wapas lane ke liye */
                position: absolute;
                top: 50%;
                bottom: auto;
                transform: translateY(-50%);
                background: transparent;
            }

            .hamburger-btn {
                display: block;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                transform: translateX(-100%);
                border-radius: 0;
                z-index: 1070;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .mobile-overlay.active {
                display: block;
                opacity: 1;
            }

            .close-sidebar-btn {
                display: block;
            }

            .auth-container {
                top: 12px;
                right: 12px;
            }

            .profile-trigger {
                padding: 5px 12px;
                gap: 8px;
                box-shadow: none;
                border-color: rgba(192, 133, 82, 0.1);
            }

            .profile-pic {
                width: 32px;
                height: 32px;
            }

            #user-name {
                font-size: 13px;
            }

            .dropdown-arrow {
                font-size: 8px;
            }

            .profile-dropdown {
                right: 0;
                left: auto;
                min-width: 180px;
            }

            .dropdown-item {
                font-size: 13.5px;
                padding: 8px 15px;
            }

            .message-bubble {
                max-width: 95%;
                font-size: 14.5px;
                padding: 14px 18px;
            }

     <script>
        // 🛑 FIREBASE CONFIG 🛑
        const firebaseConfig = {
            apiKey: "AIzaSyAYZi5fvboG6OCr8QtD8y2S29sRPDK4cd4",
            authDomain: "my-gemini-bot-gradex.firebaseapp.com",
            databaseURL: "https://my-gemini-bot-gradex-default-rtdb.firebaseio.com/",
            projectId: "my-gemini-bot-gradex",
            storageBucket: "my-gemini-bot-gradex.firebasestorage.app",
            messagingSenderId: "979133444805",
            appId: "1:979133444805:web:e1bc587482362365e2b6ac",
            measurementId: "G-0GFKZBZ8M1"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();
        const database = firebase.database();

        let currentUser = null;
        let currentChatId = null;
        let currentChatMessages = [];

        const inputSection = document.getElementById('input-section');
        const chatHistory = document.getElementById('chat-history');
        const welcomeText = document.getElementById('welcome-text');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sidebarChatList = document.getElementById('sidebar-chat-list');
        const loginBtn = document.getElementById('login-btn');
        const profileArea = document.getElementById('profile-area');
        const userPic = document.getElementById('user-pic');
        const userName = document.getElementById('user-name');
        const profileDropdown = document.getElementById('profile-dropdown');
        const profileTrigger = document.getElementById('profile-trigger');
        const darkModeToggle = document.getElementById('dark-mode-toggle');

        function initTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-theme');
                darkModeToggle.checked = true;
            }
        }
        function toggleDarkMode() {
            document.body.classList.toggle('dark-theme', darkModeToggle.checked);
            localStorage.setItem('theme', darkModeToggle.checked ? 'dark' : 'light');
        }
        initTheme();

        function toggleProfileDropdown(event) {
            if (!currentUser) return;
            profileDropdown.classList.toggle('active');
            profileTrigger.classList.toggle('active');
        }

        function closeAllMenus() {
            document.querySelectorAll('.chat-options-menu.active').forEach(menu => menu.classList.remove('active'));
        }

        window.addEventListener('click', function (e) {
            if (!profileArea.contains(e.target)) {
                profileDropdown.classList.remove('active');
                profileTrigger.classList.remove('active');
            }
            closeAllMenus();
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('mobile-overlay').classList.toggle('active');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('mobile-overlay').classList.remove('active');
        }

        function signInWithGoogle() { auth.signInWithPopup(provider).catch(err => alert("Login failed")); }
        function signOut(event) {
            profileDropdown.classList.remove('active');
            profileTrigger.classList.remove('active');
            localStorage.removeItem('activeChatId');
            auth.signOut();
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                loginBtn.style.display = 'none';
                profileTrigger.style.display = 'flex';
                userPic.src = user.photoURL;
                userName.innerText = user.displayName.split(" ")[0];

                userInput.disabled = false;
                sendBtn.disabled = false;
                loadSidebarHistory();

                const savedChatId = localStorage.getItem('activeChatId');
                if (savedChatId) {
                    loadSpecificChat(savedChatId);
                } else {
                    welcomeText.innerText = `Hello ${user.displayName.split(" ")[0]}, Main hamesha tumhare sath hu...`;
                    resetToNewChat();
                }
            } else {
                currentUser = null;
                currentChatId = null;
                loginBtn.style.display = 'block';
                profileTrigger.style.display = 'none';
                userInput.disabled = true;
                sendBtn.disabled = true;
                welcomeText.innerText = "Dost, pehle login karlo!";
                sidebarChatList.innerHTML = '';
                resetToNewChat();
            }
        });

        function loadSidebarHistory() {
            if (!currentUser) return;
            database.ref('userChats/' + currentUser.uid).on('value', (snapshot) => {
                sidebarChatList.innerHTML = '<small class="text-secondary px-3 mt-2 d-block" style="opacity: 0.7; color: var(--sidebar-text) !important;">Tumhari Baatein</small>';
                const data = snapshot.val();

                if (data) {
                    const chatsArray = Object.keys(data).map(key => {
                        return { id: key, ...data[key] };
                    });

                    chatsArray.sort((a, b) => {
                        let timeA = a.updatedAt || parseInt(a.id.split('_')[1]) || 0;
                        let timeB = b.updatedAt || parseInt(b.id.split('_')[1]) || 0;
                        return timeB - timeA;
                    });

                    chatsArray.forEach(chat => {
                        const id = chat.id;
                        const title = chat.title || "Nayi Baat";
                        const safeTitle = title.replace(/"/g, '&quot;');

                        let isActive = (currentChatId === id) ? "active-chat" : "";

                        sidebarChatList.innerHTML += `
                            <div class="chat-wrapper" id="wrapper-${id}">
                                <div class="chat-item mt-2 ${isActive}" id="chat-item-${id}" onclick="loadSpecificChat('${id}')">
                                     <span class="chat-icon">💬</span> 
                                    <span class="chat-title-text">${title}</span>
                                    <button class="chat-options-btn" onclick="event.stopPropagation(); toggleOptionsMenu('${id}')">⋮</button>
                                    <div class="chat-options-menu" id="menu-${id}">
                                        <button class="chat-option-item" onclick="event.stopPropagation(); shareChat('${id}')">🔗 Share</button>
                                        <button class="chat-option-item" onclick="event.stopPropagation(); showRenameUI('${id}')">✏️ Rename</button>
                                        <button class="chat-option-item chat-option-delete" onclick="event.stopPropagation(); showDeleteUI('${id}')">🗑️ Delete</button>
                                    </div>
                                </div>
                                <div class="inline-action-box" id="rename-box-${id}">
                                    <input type="text" class="rename-input-box" id="rename-input-${id}" value="${safeTitle}">
                                    <div class="d-flex gap-2">
                                        <button class="action-btn btn-confirm-save" onclick="saveRename('${id}')">Save</button>
                                        <button class="action-btn btn-cancel" onclick="hideActionBox('${id}', 'rename')">Cancel</button>
                                    </div>
                                </div>
                                <div class="inline-action-box" id="delete-box-${id}">
                                    <div style="font-size: 13px; margin-bottom: 8px; color: var(--white); text-align: center;">Sach me delete karna hai?</div>
                                    <div class="d-flex gap-2">
                                        <button class="action-btn btn-confirm-del" onclick="confirmDelete('${id}')">Yes</button>
                                        <button class="action-btn btn-cancel" onclick="hideActionBox('${id}', 'delete')">No</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
            });
        }

        window.toggleOptionsMenu = function (id) {
            closeAllMenus();
            const menu = document.getElementById(`menu-${id}`);
            if (menu) menu.classList.toggle('active');
        }

        window.showRenameUI = function (id) {
            closeAllMenus();
            document.getElementById(`rename-box-${id}`).classList.add('active');
            document.getElementById(`delete-box-${id}`).classList.remove('active');
        }

        window.showDeleteUI = function (id) {
            closeAllMenus();
            document.getElementById(`delete-box-${id}`).classList.add('active');
            document.getElementById(`rename-box-${id}`).classList.remove('active');
        }

        window.hideActionBox = function (id, type) {
            if (type === 'rename') document.getElementById(`rename-box-${id}`).classList.remove('active');
            if (type === 'delete') document.getElementById(`delete-box-${id}`).classList.remove('active');
        }

        window.saveRename = function (id) {
            const newTitle = document.getElementById(`rename-input-${id}`).value.trim();
            if (newTitle) {
                database.ref('userChats/' + currentUser.uid + '/' + id).update({ title: newTitle })
                    .then(() => hideActionBox(id, 'rename'));
            }
        }

        window.confirmDelete = function (id) {
            database.ref('userChats/' + currentUser.uid + '/' + id).remove()
                .then(() => {
                    if (currentChatId === id) resetToNewChat();
                });
        }

        window.loadSpecificChat = function (id) {
            currentChatId = id;
            localStorage.setItem('activeChatId', id);
            if (window.innerWidth <= 768) { closeSidebar(); }

            document.querySelectorAll('.chat-item').forEach(item => item.classList.remove('active-chat'));
            let activeElement = document.getElementById(`chat-item-${id}`);
            if (activeElement) activeElement.classList.add('active-chat');

            database.ref('userChats/' + currentUser.uid + '/' + id).once('value').then((snapshot) => {
                const data = snapshot.val();
                if (data) {
                    inputSection.classList.remove('centered-state');
                    inputSection.classList.add('bottom-state');
                    welcomeText.style.display = 'none';
                    chatHistory.style.display = 'flex';

                    chatHistory.innerHTML = "";
                    currentChatMessages = data.messages || [];

                    currentChatMessages.forEach(msg => {
                        if (msg.role === 'user') {
                            chatHistory.innerHTML += `
                            <div class="d-flex justify-content-end w-100 mb-2">
                                <div class="message-bubble user-msg">
                                    <strong>${currentUser.displayName.split(" ")[0]}:</strong> <br>${msg.text}
                                </div>
                            </div>`;
                        } else {
                            chatHistory.innerHTML += `
                            <div class="d-flex justify-content-start w-100 mb-2">
                                <div class="message-bubble bot-msg">
                                    <strong>MyGPT:</strong> <br>${marked.parse(msg.text)}
                                </div>
                            </div>`;
                        }
                    });
                    chatHistory.scrollTop = chatHistory.scrollHeight;
                }
            });
        }

        function saveStateToCloud(firstMessageText = "Nayi Baat") {
            if (!currentUser) return;

            let now = Date.now();

            if (!currentChatId) {
                currentChatId = "chat_" + now;
                localStorage.setItem('activeChatId', currentChatId);
                let safeTitle = firstMessageText ? firstMessageText.substring(0, 30) : "Nayi Baat";

                database.ref('userChats/' + currentUser.uid + '/' + currentChatId).set({
                    title: safeTitle + "...",
                    messages: currentChatMessages,
                    updatedAt: now
                });
            } else {
                database.ref('userChats/' + currentUser.uid + '/' + currentChatId).update({
                    messages: currentChatMessages,
                    updatedAt: now
                });
            }
        }

        // 🔥 THE ULTIMATE SMOOTH STREAMING AND THINKING FIX (WITH ERROR CATCHER) 🔥
        async function fetchGeminiResponse(message, expectedChatId) {
            const url = `/api/chat`;
            const userNameForPrompt = currentUser ? currentUser.displayName.split(" ")[0] : "Dost";
            const historyToSend = currentChatMessages.slice(0, -1);
            let msgId = "msg_" + Date.now();

            // 🚀 STEP 1: SABSE PEHLE UI BANAO 
            chatHistory.innerHTML += `
            <div class="d-flex justify-content-start w-100 mb-2">
                <div class="message-bubble bot-msg w-100" id="${msgId}">
                    <strong>MyGPT:</strong> <br>
                    <div id="thinking-box-${msgId}" class="d-flex align-items-center mt-2" style="color: var(--light-brown); font-style: italic;">
                        <div class="thinking-spinner"></div>
                        <div id="thinking-text-${msgId}" class="thinking-text-phrase ms-2">⏳ Dimaag laga raha hu...</div>
                    </div>
                    <div class="typing-content" style="display: none;"></div>
                </div>
            </div>`;

            let thinkingBox = document.getElementById(`thinking-box-${msgId}`);
            let thinkingText = document.getElementById(`thinking-text-${msgId}`);
            let contentDiv = document.querySelector(`#${msgId} .typing-content`);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            // 🧠 RANDOM THINKING PHRASES LOGIC
            const thinkingPhrases = [
                "🤔 Tumhari baat samajh raha hu...",
                "💡 Bas ek second dena...",
                "🧠 Gehraai mein jaa raha hu...",
                "✨ Type karne ki tayari ho rahi hai...",
                "⏳ Dimaag laga raha hu..."
            ];
            let phraseIndex = 0;
            let phraseInterval = setInterval(() => {
                phraseIndex = (phraseIndex + 1) % thinkingPhrases.length;
                if (thinkingText) {
                    thinkingText.style.opacity = 0; 
                    setTimeout(() => {
                        if (thinkingText) {
                            thinkingText.innerText = thinkingPhrases[phraseIndex];
                            thinkingText.style.opacity = 1; 
                        }
                    }, 300);
                }
            }, 2500); 

            try {
                // 🚀 STEP 2: AB GOOGLE SE FETCH KARO 
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        userName: userNameForPrompt,
                        history: historyToSend
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let rawBotReply = "";
                let isFirstChunk = true;

                // 🚀 SMOOTH TYPEWRITER QUEUE LOGIC 
                let charQueue = "";
                let isTyping = false;

                function processQueue() {
                    if (charQueue.length > 0) {
                        isTyping = true;
                        let charsToTake = Math.max(1, Math.ceil(charQueue.length / 15)); 
                        rawBotReply += charQueue.substring(0, charsToTake);
                        charQueue = charQueue.substring(charsToTake);
                        
                        contentDiv.innerHTML = marked.parse(rawBotReply);
                        chatHistory.scrollTop = chatHistory.scrollHeight;
                        
                        setTimeout(processQueue, 15);
                    } else {
                        isTyping = false;
                    }
                }

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split("\n");

                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            try {
                                const json = JSON.parse(line.substring(6));
                                
                                // 🔥 NAYA CATCH: Agar Backend ne explicitly error bheja ho (jaise Timeout ya Safety Error)
                                if (json.error) {
                                    if (isFirstChunk) {
                                        clearInterval(phraseInterval);
                                        if (thinkingBox) thinkingBox.remove();
                                        if (contentDiv) contentDiv.style.display = 'block';
                                        isFirstChunk = false;
                                    }
                                    charQueue += `\n\n<span class="text-danger fw-bold">⚠️ ${json.error}</span>`;
                                    if (!isTyping) processQueue();
                                    continue; // Aage mat padho
                                }

                                // Normal Processing
                                if (json.candidates && json.candidates[0].content && json.candidates[0].content.parts && json.candidates[0].content.parts[0].text) {
                                    
                                    // 🔥 JAISE HI PEHLA WORD AAYA, THINKING BOX KO JAD SE DELETE MAAR DO 🔥
                                    if (isFirstChunk) {
                                        clearInterval(phraseInterval); 
                                        if (thinkingBox) {
                                            thinkingBox.remove(); 
                                        }
                                        if (contentDiv) {
                                            contentDiv.style.display = 'block'; 
                                        }
                                        isFirstChunk = false;
                                    }

                                    const text = json.candidates[0].content.parts[0].text;
                                    charQueue += text;
                                    
                                    if (!isTyping) {
                                        processQueue();
                                    }
                                }
                            } catch (e) {
                                // Ignore incomplete chunks
                            }
                        }
                    }
                }

                // 🔥 FINAL FALLBACK: Agar stream empty break ho jaye (Error bina bataye aa jaye) 🔥
                if (isFirstChunk) {
                    clearInterval(phraseInterval);
                    if (thinkingBox) thinkingBox.remove();
                    if (contentDiv) {
                        contentDiv.style.display = 'block';
                        contentDiv.innerHTML = `<span class="text-danger fw-bold">⚠️ Oops! Server se proper jawab nahi aaya. Backend terminal check karo!</span>`;
                    }
                }

                // Stream aana band ho gaya, par Queue me text ho sakta hai
                const finishTypingInterval = setInterval(() => {
                    if (charQueue.length === 0 && !isTyping) {
                        clearInterval(finishTypingInterval);
                        if (rawBotReply && !isFirstChunk) {
                            currentChatMessages.push({ role: 'bot', text: rawBotReply });
                            saveStateToCloud();
                        }
                    }
                }, 50);

            } catch (error) {
                console.error("Streaming Error:", error);
                clearInterval(phraseInterval);
                if (thinkingBox) thinkingBox.remove();
                if (currentChatId === expectedChatId) {
                    chatHistory.innerHTML += `<div class="text-danger p-2">Dost, connection toot gaya ya bot atak gaya...</div>`;
                    chatHistory.scrollTop = chatHistory.scrollHeight;
                }
            }
        }

        // 🔥 NEW: Background Smart Title Generator 🔥
        async function generateSmartTitle(firstMessage, chatId) {
            try {
                const res = await fetch('/api/title', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: firstMessage })
                });
                const data = await res.json();
                
                if (data.title && currentUser) {
                    // Firebase mein jahan 'Nayi Baat...' save hua tha, usko Smart Title se replace kar do
                    database.ref('userChats/' + currentUser.uid + '/' + chatId).update({
                        title: data.title
                    });
                }
            } catch (e) {
                console.log("Title background sync failed.");
            }
        }
        
        function sendMessage() {
            if (!currentUser) return alert("Dost, pehle login karlo!");
            const text = userInput.value.trim();
            if (text === '') return;

            userInput.disabled = true;
            sendBtn.disabled = true;
            inputSection.classList.remove('centered-state');
            inputSection.classList.add('bottom-state');
            welcomeText.style.display = 'none';
            chatHistory.style.display = 'flex';

            chatHistory.innerHTML += `
            <div class="d-flex justify-content-end w-100 mb-2">
                <div class="message-bubble user-msg">
                    <strong>${currentUser.displayName.split(" ")[0]}:</strong> <br>${text}
                </div>
            </div>`;
            userInput.value = '';

            // 🛑 CHECK KARO: Kya ye nayi chat hai?
            const isNewChat = !currentChatId; 

            currentChatMessages.push({ role: 'user', text: text });
            
            // 🔥 THE REAL CHATGPT FIX: Agar nayi chat hai, toh title me Loading State dalo
            if (isNewChat) {
                saveStateToCloud("⏳ Title soch raha hu"); // Firebase isme '...' apne aap laga dega
            } else {
                saveStateToCloud(); // Purani chat hai toh sirf history update hogi
            }

            const chatRoomIdAtTimeOfSend = currentChatId;

            // 🔥 TITLE GENERATOR KO TRIGGER KARO
            if (isNewChat) {
                generateSmartTitle(text, chatRoomIdAtTimeOfSend);
            }

            setTimeout(() => {
                fetchGeminiResponse(text, chatRoomIdAtTimeOfSend).then(() => {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    userInput.focus();
                });
            }, 100);
        }

        userInput.addEventListener('keypress', function (e) { if (e.key === 'Enter') sendMessage(); });

        function resetToNewChat() {
            currentChatId = null;
            currentChatMessages = [];
            localStorage.removeItem('activeChatId');
            if (window.innerWidth <= 768) { closeSidebar(); }

            document.querySelectorAll('.chat-item').forEach(item => item.classList.remove('active-chat'));

            chatHistory.innerHTML = '';
            chatHistory.style.display = 'none';
            inputSection.classList.remove('bottom-state');
            inputSection.classList.add('centered-state');
            if (currentUser) welcomeText.style.display = 'block';
        }

        // 🔥 SHARE CHAT LOGIC 🔥
        window.shareChat = function (id) {
            closeAllMenus();

            database.ref('userChats/' + currentUser.uid + '/' + id).once('value').then((snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const shareId = "share_" + Date.now();

                    database.ref('sharedChats/' + shareId).set({
                        title: data.title || "Shared Chat",
                        messages: data.messages,
                        sharedBy: currentUser.displayName.split(" ")[0],
                        sharedAt: Date.now()
                    }).then(() => {
                        let baseUrl = window.location.href.split('index.html')[0];
                        if (!baseUrl.endsWith('/')) baseUrl += '/';
                        const finalLink = baseUrl + 'share.html?id=' + shareId;

                        document.getElementById('share-link-text').innerText = finalLink;
                        document.getElementById('share-modal-backdrop').classList.add('active');
                        document.getElementById('copy-link-btn').innerText = "📋 Copy Link";
                    });
                }
            });
        }

        window.closeShareModal = function () {
            document.getElementById('share-modal-backdrop').classList.remove('active');
        }

        window.copyShareLink = function () {
            const linkText = document.getElementById('share-link-text').innerText;
            navigator.clipboard.writeText(linkText).then(() => {
                const btn = document.getElementById('copy-link-btn');
                btn.innerText = "✅ Copied!";
                btn.style.background = "var(--safe-green, #27ae60)";

                setTimeout(() => {
                    btn.innerText = "📋 Copy Link";
                    btn.style.background = "var(--med-brown)";
                }, 2000);
            });
        }
    </script>
