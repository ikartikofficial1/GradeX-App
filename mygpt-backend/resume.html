<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Resume Roaster & Builder - GradeX</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-body: #FFF8F0; --text-main: #2c1a18;
            --light-brown: #C08552; --med-brown: #8C5A3C; --dark-brown: #4B2E2B;
            --card-bg: #ffffff; --card-shadow: rgba(140, 90, 60, 0.08);
            --danger-red: #e74c3c; --safe-green: #27ae60;
        }

        body.dark-theme {
            --bg-body: #1c1110; --text-main: #e6dfd8;
            --input-bg: #2c1a18; --input-border: rgba(192, 133, 82, 0.3);
            --card-bg: #241514; --card-shadow: rgba(0, 0, 0, 0.4);
        }

        body { background-color: var(--bg-body); color: var(--text-main); font-family: "Lexend Deca", sans-serif; min-height: 100vh; display: flex; flex-direction: column; transition: background-color 0.3s ease, color 0.3s ease; }
        
        /* Navbar with Dark Mode Toggle */
        .top-navbar { padding: 20px 30px; border-bottom: 1px solid rgba(192, 133, 82, 0.15); display: flex; justify-content: space-between; align-items: center; }
        .back-btn { background: var(--card-bg); border: 1px solid rgba(192, 133, 82, 0.3); color: var(--text-main); padding: 8px 20px; border-radius: 50px; text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px var(--card-shadow); transition: 0.3s; }
        .back-btn:hover { background: var(--light-brown); color: white; transform: translateX(-3px); }
        
        .theme-toggle-btn { background: var(--card-bg); border: 1px solid rgba(192, 133, 82, 0.3); color: var(--text-main); padding: 8px 15px; border-radius: 50px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px var(--card-shadow); transition: 0.3s; }
        .theme-toggle-btn:hover { background: var(--light-brown); color: white; transform: scale(1.05); }

        .main-container { flex-grow: 1; display: flex; justify-content: center; padding: 30px 20px; }
        .tool-card { background: var(--card-bg); padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px var(--card-shadow); border: 1px solid rgba(192, 133, 82, 0.15); width: 100%; max-width: 800px; animation: fadeInUp 0.5s ease; }

        .input-group-custom { margin-bottom: 20px; }
        .input-group-custom label { font-weight: 600; margin-bottom: 8px; display: block; opacity: 0.9; }
        .custom-input { background-color: var(--bg-body); border: 2px solid rgba(192, 133, 82, 0.3); color: var(--text-main); border-radius: 12px; padding: 14px 20px; width: 100%; font-size: 15px; transition: 0.3s; }
        .custom-textarea { background-color: var(--bg-body); border: 2px solid rgba(192, 133, 82, 0.3); color: var(--text-main); border-radius: 12px; padding: 14px 20px; width: 100%; height: 150px; resize: none; font-size: 15px; transition: 0.3s; }
        .custom-input:focus, .custom-textarea:focus { border-color: var(--light-brown); outline: none; box-shadow: 0 0 0 4px rgba(192, 133, 82, 0.1); }

        .roast-btn { background: linear-gradient(135deg, var(--med-brown), var(--dark-brown)); color: white; border: none; width: 100%; padding: 16px; border-radius: 16px; font-weight: 600; font-size: 16px; transition: 0.3s; box-shadow: 0 4px 15px rgba(140, 90, 60, 0.3); margin-top: 10px; }
        .roast-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(140, 90, 60, 0.4); }
        .roast-btn:disabled { background: #d4c5ba; cursor: not-allowed; transform: none; box-shadow: none; }

        /* 🔥 RESULT BOX WITH CUSTOM SCROLLBAR 🔥 */
        .ai-result-box { 
            margin-top: 30px; 
            background: rgba(192, 133, 82, 0.05); 
            border-radius: 16px; 
            padding: 30px; 
            display: none; 
            font-size: 15.5px; 
            line-height: 1.7; 
            border: 1px solid rgba(192, 133, 82, 0.2); 
            max-height: 500px; /* Scrolling enable karne ke liye */
            overflow-y: auto; /* Y axis pe scroll */
        }
        
        /* THEME BASED SCROLLBAR */
        .ai-result-box::-webkit-scrollbar { width: 6px; }
        .ai-result-box::-webkit-scrollbar-thumb { background: var(--light-brown); border-radius: 10px; }
        .ai-result-box::-webkit-scrollbar-track { background: rgba(192, 133, 82, 0.1); border-radius: 10px; }

        /* Markdown Styling */
        .ai-result-box h3 { font-weight: 700; margin-top: 25px; margin-bottom: 15px; font-size: 20px; }
        .ai-result-box h3:first-child { margin-top: 0; }
        .ai-result-box hr { border-color: rgba(192, 133, 82, 0.3); margin: 25px 0; }
        .ai-result-box ul { padding-left: 20px; margin-bottom: 15px; }

        .loader-container { display: flex; justify-content: center; align-items: center; position: relative; width: 60px; height: 60px; margin: 30px auto; }
        .spinner-ring { position: absolute; width: 100%; height: 100%; border: 4px solid rgba(192, 133, 82, 0.2); border-top-color: var(--light-brown); border-radius: 50%; animation: spin 1s linear infinite; }
        .loader-logo { width: 30px; height: 30px; object-fit: contain; animation: pulse 1.5s ease-in-out infinite; }

        .continue-btn { background-color: transparent; border: 2px solid var(--med-brown); color: var(--med-brown); width: 100%; padding: 14px; border-radius: 16px; font-weight: 600; font-size: 16px; margin-top: 25px; transition: 0.3s; display: none; }
        .continue-btn:hover { background-color: var(--med-brown); color: white; transform: translateY(-2px); }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.8; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body>
    <div class="top-navbar">
        <a href="tools.html" class="back-btn"><span>←</span> Back To Tools</a>
        <button class="theme-toggle-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>

    <div class="main-container">
        <div class="tool-card">
            <h2 class="text-center fw-bold mb-2" style="color: var(--med-brown);">📄 AI Resume Roaster & Builder</h2>
            <p class="text-center opacity-75 mb-4">Tumhara boring resume pehle ruthlessly roast hoga, aur phir Google-level par rebuild hoga.</p>

            <div class="input-group-custom">
                <label>Target Job Role</label>
                <input type="text" id="job-role" class="custom-input" placeholder="e.g. Software Engineer, Marketing Intern...">
            </div>

            <div class="input-group-custom">
                <label>Paste your Resume Text (or bullet points)</label>
                <textarea id="resume-text" class="custom-textarea" placeholder="I am a hardworking student. I did a college project using HTML. I have good communication skills..."></textarea>
            </div>

            <button id="roast-btn" class="roast-btn" onclick="processResume()">🔥 Roast & Rebuild My Resume</button>

            <div id="result-area" class="ai-result-box">
                <div id="loading-spinner" class="loader-container" style="display: none;">
                    <div class="spinner-ring"></div>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Google_Gemini_logo.svg" class="loader-logo">
                </div>
                <div id="ai-content"></div>

                <button id="continue-btn" class="continue-btn" onclick="continueToMainChat()">💬 Discuss this Resume with AI</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAYZi5fvboG6OCr8QtD8y2S29sRPDK4cd4",
            authDomain: "my-gemini-bot-gradex.firebaseapp.com",
            databaseURL: "https://my-gemini-bot-gradex-default-rtdb.firebaseio.com/",
            projectId: "my-gemini-bot-gradex",
            storageBucket: "my-gemini-bot-gradex.firebasestorage.app",
            messagingSenderId: "979133444805",
            appId: "1:979133444805:web:e1bc587482362365e2b6ac"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const database = firebase.database();
        let currentUser = null;
        let savedAiResponse = "";

        auth.onAuthStateChanged(user => { currentUser = user; });

        function applyTheme(theme) {
            const btn = document.getElementById('theme-btn');
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
                btn.innerText = "☀️";
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('dark-theme');
                btn.innerText = "🌙";
                localStorage.setItem('theme', 'light');
            }
        }

        if (localStorage.getItem('theme') === 'dark') applyTheme('dark');

        function toggleTheme() {
            if (document.body.classList.contains('dark-theme')) applyTheme('light');
            else applyTheme('dark');
        }

        async function processResume() {
            const role = document.getElementById('job-role').value.trim();
            const text = document.getElementById('resume-text').value.trim();
            const roastBtn = document.getElementById('roast-btn');
            const resultArea = document.getElementById('result-area');
            const aiContent = document.getElementById('ai-content');
            const spinner = document.getElementById('loading-spinner');
            const continueBtn = document.getElementById('continue-btn');

            if (!role || !text) return alert("Bhai, Role aur Resume text dono daalna zaroori hai!");

            roastBtn.disabled = true;
            roastBtn.innerText = "AI is tearing your resume apart... 😈";
            continueBtn.style.display = 'none';
            resultArea.style.display = 'block';
            aiContent.style.display = 'none';
            spinner.style.display = 'flex';

            const userName = currentUser ? currentUser.displayName.split(" ")[0] : "Dost";

            const secretPrompt = `
            User ka Target Job Role hai: "${role}".
            Aur ye raha uska current Resume Text: "${text}"

            Tujhe ek hi response mein 2 alag-alag personas mein act karna hai. Jawab strictly in 2 sections me hona chahiye:

            ### 🔥 THE ROAST (Strict HR Mode)
            Ekdum frustrated aur strict FAANG HR ban ja jisne aaj 500 bekar resumes reject kiye hain. 
            - User ke resume me kya kachra hai, cliches (jaise hardworking, team player, communication skills), aur weak action verbs ko point out kar.
            - Brutally aur sarcastically roast kar. (Hindi/Hinglish me, thoda funny aur kadwa sach bol jisse ego hit ho par reality samajh aaye).

            ---

            ### 🛠️ THE REBUILD (Career Coach Mode)
            Ab ekdam empathetic aur expert Silicon Valley Career Coach ban ja.
            - Upar ki galtiyon ko sudhar kar, user ke resume points ko Google ke 'XYZ Formula' (Accomplished [X] as measured by [Y], by doing [Z]) me rewrite kar.
            - Kam se kam 3-4 ekdum placement-ready, professional bullet points de jo user direct copy-paste kar sake.
            - ATS pass karne ke liye 5 strong Action Verbs ki list de.
            
            Format strictly Markdown me rakhna.
            `;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: secretPrompt, userName: userName })
                });
                
                const data = await response.json();
                spinner.style.display = 'none';
                
                // 🔥 THE FIX: MAKE SURE CONTENT BOX IS VISIBLE 🔥
                aiContent.style.display = 'block'; 

                if (data.error) {
                    aiContent.innerHTML = `<span class='text-danger fw-bold'>API Error: ${data.error.message || data.error}</span>`;
                    roastBtn.disabled = false; roastBtn.innerText = "Try Again";
                    return;
                }

                if (data && data.candidates) {
                    let reply = data.candidates[0].content.parts[0].text;
                    savedAiResponse = reply;
                    aiContent.innerHTML = ""; 
                    
                    if (currentUser) {
                        const resumeId = "resume_" + Date.now();
                        database.ref('userResumes/' + currentUser.uid + '/' + resumeId).set({
                            targetRole: role,
                            oldResume: text,
                            aiFeedback: reply,
                            timestamp: Date.now()
                        });
                    }

                    let index = 0;
                    let interval = setInterval(() => {
                        if (index <= reply.length) {
                            aiContent.innerHTML = marked.parse(reply.substring(0, index));
                            // Scroll to bottom dynamically as it types
                            resultArea.scrollTop = resultArea.scrollHeight; 
                            index += 5; 
                        } else {
                            clearInterval(interval);
                            roastBtn.disabled = false;
                            roastBtn.innerText = "🔥 Roast Another Resume";
                            continueBtn.style.display = 'block';
                            // Make sure continue button is visible by scrolling all the way down
                            resultArea.scrollTop = resultArea.scrollHeight; 
                        }
                    }, 15);
                }
            } catch (error) {
                spinner.style.display = 'none';
                
                // 🔥 THE FIX: SHOW CONTENT BOX EVEN ON CATCH ERROR 🔥
                aiContent.style.display = 'block'; 
                aiContent.innerHTML = `<span class='text-danger fw-bold'>Connection Error: Lagta hai backend server band hai. VS Code mein 'node server.js' chalao!</span>`;
                
                roastBtn.disabled = false; 
                roastBtn.innerText = "Try Again";
            }
        }

        function continueToMainChat() {
            if (!currentUser) { alert("Pehle login karlo bhai!"); return; }
            
            const continueBtn = document.getElementById('continue-btn');
            continueBtn.innerText = "Creating Chat... ⏳";
            continueBtn.disabled = true;

            const newChatId = "resumechat_" + Date.now();
            const msgs = [
                { role: 'user', text: `Ye mera resume tha:\n${document.getElementById('resume-text').value}\nRole: ${document.getElementById('job-role').value}` },
                { role: 'bot', text: savedAiResponse },
                { role: 'bot', text: "Haa bhai, ab batao is resume mein aage kya theek karna hai? Kya koi aur point add karna chahte ho? 😊" }
            ];

            database.ref('userChats/' + currentUser.uid + '/' + newChatId).set({
                title: "📄 Resume Builder Chat",
                messages: msgs
            }).then(() => {
                localStorage.setItem('activeChatId', newChatId);
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
