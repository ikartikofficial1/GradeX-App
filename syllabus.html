<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syllabus & Time Calculator - GradeX</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* 🔥 THEME VARIABLES 🔥 */
        :root {
            --bg-body: #FFF8F0;
            --text-main: #2c1a18;
            --input-bg: #ffffff;
            --input-border: rgba(192, 133, 82, 0.3);
            --light-brown: #C08552;
            --med-brown: #8C5A3C;
            --dark-brown: #4B2E2B;
            --card-bg: #ffffff;
            --card-shadow: rgba(140, 90, 60, 0.08);
        }

        body.dark-theme {
            --bg-body: #1c1110;
            --text-main: #e6dfd8;
            --input-bg: #2c1a18;
            --input-border: rgba(192, 133, 82, 0.2);
            --card-bg: #241514;
            --card-shadow: rgba(0, 0, 0, 0.4);
        }

        body { background-color: var(--bg-body); color: var(--text-main); font-family: "Lexend Deca", sans-serif; min-height: 100vh; display: flex; flex-direction: column; transition: background-color 0.3s ease, color 0.3s ease; }

        /* NAVBAR WITH TOGGLE */
        .top-navbar { padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(192, 133, 82, 0.15); }
        .back-btn { background: var(--card-bg); border: 1px solid var(--input-border); color: var(--text-main); padding: 8px 20px; border-radius: 50px; text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s ease; box-shadow: 0 4px 10px var(--card-shadow); }
        .back-btn:hover { background: var(--light-brown); color: white; transform: translateX(-3px); }
        
        .theme-toggle-btn { background: var(--card-bg); border: 1px solid var(--input-border); color: var(--text-main); padding: 8px 15px; border-radius: 50px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px var(--card-shadow); transition: 0.3s; }
        .theme-toggle-btn:hover { background: var(--light-brown); color: white; transform: scale(1.05); }

        .main-container { flex-grow: 1; display: flex; justify-content: center; padding: 30px 20px; }

        .analyzer-card { background: var(--card-bg); padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px var(--card-shadow); border: 1px solid var(--input-border); width: 100%; max-width: 750px; animation: fadeInUp 0.5s ease; display: flex; flex-direction: column;}

        .tool-icon { font-size: 45px; text-align: center; margin-bottom: 10px; }
        .tool-title { text-align: center; font-weight: 700; color: var(--med-brown); margin-bottom: 10px; }
        .tool-desc { text-align: center; font-size: 15px; opacity: 0.8; margin-bottom: 30px; }

        .input-group-custom { margin-bottom: 20px; }
        .input-group-custom label { font-weight: 600; margin-bottom: 8px; display: block; opacity: 0.9; }
        
        .custom-input { background-color: var(--input-bg); border: 2px solid var(--input-border); color: var(--text-main); border-radius: 16px; padding: 16px 20px; font-size: 15.5px; width: 100%; transition: all 0.3s; }
        .custom-textarea { background-color: var(--input-bg); border: 2px solid var(--input-border); color: var(--text-main); border-radius: 16px; padding: 18px 20px; font-size: 15.5px; width: 100%; transition: all 0.3s; resize: none; min-height: 120px; line-height: 1.6; }
        .custom-input:focus, .custom-textarea:focus { border-color: var(--light-brown); outline: none; box-shadow: 0 0 0 4px rgba(192, 133, 82, 0.1); }
        
        /* 🔥 CUSTOM SCROLLBARS 🔥 */
        .custom-textarea::-webkit-scrollbar, .ai-result-box::-webkit-scrollbar { width: 8px; }
        .custom-textarea::-webkit-scrollbar-track, .ai-result-box::-webkit-scrollbar-track { background: rgba(192, 133, 82, 0.05); border-radius: 10px; margin: 10px 0; }
        .custom-textarea::-webkit-scrollbar-thumb, .ai-result-box::-webkit-scrollbar-thumb { background: rgba(192, 133, 82, 0.4); border-radius: 10px; }
        .custom-textarea::-webkit-scrollbar-thumb:hover, .ai-result-box::-webkit-scrollbar-thumb:hover { background: var(--light-brown); }

        .analyze-btn { background-color: var(--med-brown); color: white; border: none; width: 100%; padding: 16px; border-radius: 16px; font-weight: 600; font-size: 16px; transition: 0.3s; box-shadow: 0 4px 15px rgba(140, 90, 60, 0.2); }
        .analyze-btn:hover:not(:disabled) { background-color: var(--dark-brown); transform: translateY(-2px); color: white; }
        .analyze-btn:disabled { background-color: #d4c5ba; cursor: not-allowed; transform: none; }

        .continue-btn { background-color: transparent; border: 2px solid var(--med-brown); color: var(--med-brown); width: 100%; padding: 14px; border-radius: 16px; font-weight: 600; font-size: 16px; margin-top: 20px; transition: 0.3s; display: none; }
        .continue-btn:hover { background-color: var(--med-brown); color: white; transform: translateY(-2px); }

        .ai-result-box { margin-top: 30px; background: rgba(192, 133, 82, 0.05); border: 1px solid rgba(192, 133, 82, 0.2); border-radius: 20px; padding: 25px 20px 25px 25px; display: none; animation: fadeInUp 0.4s ease; font-size: 15.5px; line-height: 1.7; max-height: 450px; overflow-y: auto; overflow-x: hidden; }
        .ai-result-box h3, .ai-result-box h4 { color: var(--med-brown); font-weight: 600; margin-top: 20px; margin-bottom: 10px; }
        .ai-result-box h3:first-child { margin-top: 0; }
        .ai-result-box strong { color: var(--light-brown); }
        .ai-result-box ul { padding-left: 20px; margin-bottom: 15px; }

        .loader-container { display: flex; justify-content: center; align-items: center; position: relative; width: 50px; height: 50px; margin: 20px auto; }
        .spinner-ring { position: absolute; width: 100%; height: 100%; border: 3px solid rgba(192, 133, 82, 0.2); border-top-color: var(--light-brown); border-radius: 50%; animation: spin 1s linear infinite; }
        .loader-logo { width: 25px; height: 25px; object-fit: contain; animation: pulse 1.5s ease-in-out infinite; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.8; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 100% Responsiveness Fixes */
        @media (max-width: 600px) {
            .analyzer-card { padding: 25px; }
            .tool-icon { font-size: 35px; }
            .tool-title { font-size: 22px; }
            .top-navbar { padding: 15px 20px; }
            .ai-result-box { padding: 15px 10px 15px 15px; font-size: 14.5px; }
        }
    </style>
</head>

<body>

    <div class="top-navbar">
        <a href="tools.html" class="back-btn"><span>←</span> Back to Tools</a>
        <button class="theme-toggle-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>

    <div class="main-container">
        <div class="analyzer-card">
            <div class="tool-icon">⏳</div>
            <h2 class="tool-title">Time vs Syllabus Hacker</h2>
            <p class="tool-desc">Batao kya kya padhna baaki hai aur din kitne bache hain. AI tumhe batayega kya ratna hai aur kya chhodna hai!</p>

            <div class="input-group-custom">
                <label>Days Left for Exam 📆</label>
                <input type="number" id="days-input" class="custom-input" placeholder="e.g. 5">
            </div>

            <div class="input-group-custom">
                <label>Syllabus / Topics to Cover 📚</label>
                <textarea id="topics-input" class="custom-textarea" placeholder="Example:&#10;DBMS: Normalization, SQL, Indexing&#10;OS: Deadlock, Paging, Threads&#10;Maths: Integration..."></textarea>
            </div>

            <button id="analyze-btn" class="analyze-btn" onclick="startStrategy()">🚀 Build Master Study Plan</button>

            <div id="result-area" class="ai-result-box">
                <div id="loading-spinner" class="loader-container" style="display: none;">
                    <div class="spinner-ring"></div>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Google_Gemini_logo.svg" alt="AI Logo" class="loader-logo">
                </div>
                <div id="ai-content" class="typing-content" style="display: none;"></div>
                
                <button id="continue-btn" class="continue-btn" onclick="continueInMainChat()">💬 Discuss this Plan with AI</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAYZi5fvboG6OCr8QtD8y2S29sRPDK4cd4",
            authDomain: "my-gemini-bot-gradex.firebaseapp.com",
            databaseURL: "https://my-gemini-bot-gradex-default-rtdb.firebaseio.com/",
            projectId: "my-gemini-bot-gradex",
            storageBucket: "my-gemini-bot-gradex.firebasestorage.app",
            messagingSenderId: "979133444805",
            appId: "1:979133444805:web:e1bc587482362365e2b6ac"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const database = firebase.database();
        let currentUser = null;

        auth.onAuthStateChanged(user => {
            if (user) currentUser = user;
            else currentUser = null;
        });

        // 🔥 THEME LOGIC 🔥
        function applyTheme(theme) {
            const btn = document.getElementById('theme-btn');
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
                btn.innerText = "☀️";
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('dark-theme');
                btn.innerText = "🌙";
                localStorage.setItem('theme', 'light');
            }
        }
        if (localStorage.getItem('theme') === 'dark') applyTheme('dark');
        function toggleTheme() {
            if (document.body.classList.contains('dark-theme')) applyTheme('light');
            else applyTheme('dark');
        }

        let savedUserPrompt = "";
        let savedAiResponse = "";

        async function startStrategy() {
            const days = document.getElementById('days-input').value.trim();
            const topics = document.getElementById('topics-input').value.trim();
            
            const analyzeBtn = document.getElementById('analyze-btn');
            const resultArea = document.getElementById('result-area');
            const aiContent = document.getElementById('ai-content');
            const loadingSpinner = document.getElementById('loading-spinner');
            const continueBtn = document.getElementById('continue-btn');

            if (!days || !topics) { alert("Bhai, Din aur Syllabus dono daalna zaroori hai!"); return; }
            if (days <= 0) { alert("Exams khatam ho gaye kya bhai? 0 se zyada din daal!"); return; }

            // UI Adjustments
            analyzeBtn.disabled = true;
            analyzeBtn.innerText = "Internet khangaal raha hu... ⏳";
            continueBtn.style.display = 'none';
            resultArea.style.display = 'block';
            aiContent.style.display = 'none';
            loadingSpinner.style.display = 'flex';

            const userNameForPrompt = currentUser ? currentUser.displayName.split(" ")[0] : "Dost";

            // 🔥 THE PARETO PRINCIPLE (80/20) GUARDRAIL PROMPT 🔥
            const secretInstruction = `
            Tu GradeX ka ek Highly Dedicated, Expert Exam Strategist aur bada bhai hai.
            Tera maqsad hai student ke bache hue syllabus aur time ko analyze karke ek 'Smart Study Plan' banana jisse wo kam time me pass ho sake (80/20 Pareto Principle).
            
            USER INPUT:
            Days Left: "${days}"
            Topics to Cover: "${topics}"

            Tujhe is input ko dhyan se padhna hai aur in 2 Scenarios mein se ek ko STRICTLY follow karna hai:

            ❌ SCENARIO 1 (Agar input mein Syllabus nahi hai ya faltu baat hai):
            Agar user ne sirf 'Hi', 'Hello', 'Tum kon ho', ya koi random baat likhi hai jisme padhai ke topics nahi hain:
            - Apna jawab EXACTLY is emoji se shuru kar: 🛑
            - Usko ek witty aur funny reply de. (e.g. "🛑 Bhai exam sar pe hain aur tu mujhse timepass kar raha hai? Yahan syllabus aur bache hue din daal...")
            - Usko clearly samjha de ki faltu baat ke liye 'Back to Chat' daba kar wahan aaja.

            ✅ SCENARIO 2 (Agar input mein Topics aur Days hain):
            Agar input me sach mein topics hain, toh tujhe 🛑 EMOJI KA USE BILKUL NAHI KARNA HAI.
            Tera apna internet/academic database use karke in topics ka Post-Mortem kar. Kam se kam 300-500 words ka Deep Action Plan bana. Structure ye hoga:
            1. 🚨 **High-Yield vs Low-Yield (MOST IMPORTANT):** In topics me se sabse zyada repeat hone wale aur important topics (High Yield) alag nikal, aur non-important (Low Yield) alag kar. Bata ki inme se kin topics ko CHHODNA hai ya upar se dekhna hai taaki time bache.
            2. ⏳ **Daily Target Breakdown:** ${days} din ke hisaab se math laga aur bata ki roz kitne ghante padhna padega. Kis din kaunsa 'High-Yield' topic uthana hai.
            3. 🧠 **Hacks for specific topics:** In specific topics ko jaldi yaad karne ki tricks bata (jaise kisi me flowchart banana hai, kisi me sirf formula rattne hain).
            4. 🔥 **Motivation:** End me ek aisi aag lagane wali line bol jisse padhne ka man kare.

            Bhasha ekdum human, friendly aur Hinglish rakh. Jawab ko Markdown se sundar format kar.
            `;

            try {
                const response = await fetch('http://localhost:3000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: secretInstruction, userName: userNameForPrompt })
                });

                const data = await response.json();
                loadingSpinner.style.display = 'none';
                aiContent.style.display = 'block';

                if (data.error) {
                    aiContent.innerHTML = `<span class='text-danger fw-bold'>Error: ${data.error.message || data.error}</span>`;
                    resetButton();
                    return;
                }

                if (data && data.candidates) {
                    let rawBotReply = data.candidates[0].content.parts[0].text;
                    aiContent.innerHTML = "";

                    savedUserPrompt = `Mere paas ${days} din bache hain aur ye syllabus hai:\n${topics}`;
                    savedAiResponse = rawBotReply;

                    let index = 0;

                    await new Promise((resolve) => {
                        let typingInterval = setInterval(() => {
                            if (index <= rawBotReply.length) {
                                aiContent.innerHTML = marked.parse(rawBotReply.substring(0, index));
                                resultArea.scrollTop = resultArea.scrollHeight; 
                                index += 4; 
                            } else {
                                clearInterval(typingInterval);
                                aiContent.innerHTML = marked.parse(rawBotReply);
                                resultArea.scrollTop = resultArea.scrollHeight;

                                // Agar reply '🛑' se shuru nahi ho raha (yaani syllabus analysis tha)
                                if (!rawBotReply.trim().startsWith("🛑")) {
                                    continueBtn.style.display = 'block';
                                    resultArea.scrollTop = resultArea.scrollHeight;
                                }
                                resolve();
                            }
                        }, 15);
                    });
                }
            } catch (error) {
                loadingSpinner.style.display = 'none';
                aiContent.style.display = 'block';
                aiContent.innerHTML = `<span class='text-danger fw-bold'>Connection Error: Backend server band hai. Apne VS Code terminal me 'node server.js' chalao!</span>`;
            }
            resetButton();
        }

        function resetButton() {
            const analyzeBtn = document.getElementById('analyze-btn');
            analyzeBtn.disabled = false;
            analyzeBtn.innerText = "🚀 Build Master Study Plan";
        }

        function continueInMainChat() {
            if (!currentUser) {
                alert("Bhai, aage ki chat save karne ke liye pehle login karna padega. Chat page par jaa kar login karo!");
                window.location.href = 'index.html';
                return;
            }

            const continueBtn = document.getElementById('continue-btn');
            continueBtn.innerText = "Chat tayar ho rahi hai... ⏳";
            continueBtn.disabled = true;

            const newChatId = "syllabus_" + Date.now();

            const initialMessages = [
                { role: 'user', text: savedUserPrompt },
                { role: 'bot', text: savedAiResponse },
                { role: 'bot', text: "Haan bhai, ab batao is schedule mein kya dikkat aa rahi hai? Kisi ek topic ko detail mein samjhana hai kya? Main yahin hu! 😊" }
            ];

            database.ref('userChats/' + currentUser.uid + '/' + newChatId).set({
                title: "⏳ Time vs Syllabus Plan",
                messages: initialMessages
            }).then(() => {
                localStorage.setItem('activeChatId', newChatId);
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
